<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数学辅助教学工具 | 王乐成老师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03060c);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            color: #eef5ff;
            line-height: 1.4;
            position: relative;
            overflow-x: hidden;
        }

        /* 科技感动态网格背景 (简约但有层次) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* 动态光晕 (科技感流动) */
        body::after {
            content: "";
            position: fixed;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at 30% 40%, rgba(0, 180, 255, 0.1), transparent 70%);
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: slowDrift 18s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
            100% { transform: translate(5%, 8%) scale(1.2); opacity: 0.7; }
        }

        /* 主容器，相对定位让内容浮在背景之上 */
        .app {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
        }

        /* 头部区域：右上角待创建 + 左侧简约标识 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            flex-wrap: wrap;
            gap: 1rem;
            background: transparent;
        }

        .logo-area {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(10, 20, 35, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border-left: 2px solid #0cf;
            color: #b3f0ff;
        }

        .logo-area span {
            color: #0cf;
            font-weight: 600;
        }

        .badge-pending {
            background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 204, 255, 0.4);
            box-shadow: 0 0 8px rgba(0, 204, 255, 0.2);
            transition: all 0.2s ease;
            color: #bbf5ff;
        }

        .badge-pending::before {
            content: "⚡ ";
            font-size: 0.9rem;
            filter: drop-shadow(0 0 2px cyan);
        }

        .badge-pending:hover {
            border-color: #0cf;
            background: rgba(0, 160, 210, 0.2);
            box-shadow: 0 0 12px rgba(0, 204, 255, 0.5);
        }

        /* 主区域 - 居中两个按钮 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* 标题副标题区域 突出教师辅助工具定位 */
        .hero-text {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero-text h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #7bd9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .hero-text p {
            font-size: 1.1rem;
            margin-top: 0.75rem;
            color: #bfd9ff;
            background: rgba(0, 20, 40, 0.4);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            font-weight: 400;
        }

        /* 双按钮容器 (横排，严格并排，不换行) */
        .button-group {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: nowrap;   /* 确保始终横排，不折行 */
            margin: 1rem 0;
        }

        /* 按钮卡片样式 (矩形科技感) */
        .tool-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(20, 30, 55, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.5rem 2.2rem;
            min-width: 240px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 180, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(0, 180, 255, 0);
            text-align: center;
            cursor: pointer;
        }

        /* 按钮内主要文字 */
        .btn-title {
            font-size: 1.55rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(120deg, #f0faff, #b3e4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }

        .btn-sub {
            font-size: 0.85rem;
            color: #9bb8e0;
            font-weight: 400;
            border-top: 1px dashed rgba(100, 180, 250, 0.4);
            padding-top: 0.5rem;
            margin-top: 0.2rem;
            width: 100%;
        }

        /* 悬浮动效 */
        .tool-btn:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(30, 50, 85, 0.85);
            border-color: #0cf;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 204, 255, 0.4);
        }

        .tool-btn:active {
            transform: translateY(-3px) scale(0.98);
            transition: 0.05s;
        }

        /* 辅助小装饰: 数学符号线条 */
        .math-deco {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            font-size: 1.1rem;
            opacity: 0.5;
            font-weight: 300;
            letter-spacing: 4px;
            color: #58b9ff;
        }

        /* 底部作者信息栏 */
        .footer {
            text-align: center;
            padding: 1.8rem 1rem;
            border-top: 1px solid rgba(0, 180, 255, 0.2);
            margin-top: auto;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            font-size: 0.9rem;
        }

        .footer p {
            color: #b0ceff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .author {
            font-weight: 600;
            color: #8dd0ff;
            background: rgba(0, 40, 60, 0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .role-badge {
            font-size: 0.8rem;
            background: rgba(0, 204, 255, 0.15);
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            border-left: 2px solid #0cf;
        }

        /* 响应式：保持按钮横排，但缩放比例以适应小屏 */
        @media (max-width: 680px) {
            .button-group {
                gap: 1.2rem;
            }
            .tool-btn {
                min-width: 180px;
                padding: 1rem 1.2rem;
            }
            .btn-title {
                font-size: 1.2rem;
            }
            .hero-text h1 {
                font-size: 1.8rem;
            }
            .hero-text p {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 520px) {
            .button-group {
                gap: 0.9rem;
            }
            .tool-btn {
                min-width: 155px;
                padding: 0.9rem 0.8rem;
            }
            .btn-title {
                font-size: 1rem;
            }
            .btn-sub {
                font-size: 0.7rem;
            }
            .header {
                padding: 1rem 1.2rem;
            }
            .hero-text {
                margin-bottom: 2rem;
            }
            .logo-area {
                font-size: 0.7rem;
            }
        }

        /* 极端超小屏依然保持横排 (强制不换行，但可能内容折行，但高度自适应) */
        @media (max-width: 420px) {
            .tool-btn {
                min-width: 140px;
                padding: 0.7rem 0.5rem;
            }
            .btn-title {
                font-size: 0.9rem;
                white-space: normal;
                word-break: keep-all;
            }
            .btn-sub {
                font-size: 0.65rem;
            }
            .button-group {
                gap: 0.7rem;
            }
        }

        /* 确保按钮容器在任何情况下都是水平flex，不换行 */
        @media (max-width: 360px) {
            .tool-btn {
                min-width: 130px;
            }
            .btn-title {
                font-size: 0.85rem;
            }
        }

        /* 鼠标点击额外辅助 */
        a:focus-visible {
            outline: 2px solid #0cf;
            outline-offset: 4px;
            border-radius: 24px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo-area">
            📐 <span>MathAid</span> · 王老师的智能教学辅助
        </div>
        <div class="badge-pending">
            待创建 · 更多模块...
        </div>
    </div>

    <div class="main-content">
        <div class="hero-text">
            <h1>函数可视化教学工坊</h1>
            <p>⚡ 为数学老师量身打造 · 动态演示与交互辅助工具 ⚡</p>
        </div>

        <!-- 横排并列的两个矩形按钮，指向另外两个html页面 -->
        <div class="button-group">
            <a href="二次函数辅助教学.html" class="tool-btn" target="_self">
                <div class="btn-title">📈 二次函数</div>
                <div class="btn-sub">辅助教学 · 图像性质 · 互动演示</div>
            </a>
            <a href="正弦函数辅助教学.html" class="tool-btn" target="_self">
                <div class="btn-title">〰️ 正弦函数</div>
                <div class="btn-sub">辅助教学 · 周期变换 · 动态波形</div>
            </a>
        </div>

        <!-- 简约装饰线条，体现科技与数学结合 -->
        <div class="math-deco">
            <span>∫</span> <span>f(x) = ax²+bx+c</span> <span>sinθ</span> <span>ω</span> <span>π</span>
        </div>
    </div>

    <div class="footer">
        <p>
            👨‍🏫 作者：<span class="author">王乐成</span>
            <span class="role-badge">✧ 数学辅助工具开发者 ✧</span>
            <span style="opacity:0.7;">| 专为课堂教学设计 | 直观·高效·探索</span>
        </p>
        <p style="font-size:0.75rem; margin-top: 0.4rem; opacity:0.6;">
            🌟 点击按钮进入对应教学模块 · 支持二次函数与正弦函数动态分析 🌟
        </p>
    </div>
</div>

<!-- 可选：增加简单的控制台提示，仅用于展示辅助工具属性 -->
<script>
    // 极简控制台输出，表明主页作为教师辅助工具入口
    (function() {
        console.log("数学辅助教学工具主页 | 设计者：王乐成 | 为老师提供函数教学支持");
        // 也可以预检测链接指向文件是否存在（只是开发友好提示，不干扰用户）
        const links = document.querySelectorAll('.tool-btn');
        links.forEach(link => {
            link.addEventListener('click', (e) => {
                // 仅控制台提示跳转，不阻止默认行为
                const targetUrl = link.getAttribute('href');
                console.log(`即将跳转到教学模块: ${targetUrl} , 请确保对应html文件存在于相同目录下`);
            });
        });
    })();
</script>
</body>
</html>
